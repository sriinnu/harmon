name: npm auth check

# On-demand proof that NPM_TOKEN can publish @sriinnu/harmon.
#
# Read APIs cannot prove write rights: granular tokens 403 on the org
# listing endpoint regardless of their package grants, and npm masks
# permission failures as 404 only at publish time. The only honest probe is
# a real publish — so this publishes a canary version under a throwaway
# dist-tag and immediately unpublishes it.
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: whoami (authentication)
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: canary publish + unpublish (authorization)
        run: |
          CANARY="0.0.0-authcheck.${GITHUB_RUN_ID}"
          cd apps/harmon-cli
          npm version "$CANARY" --no-git-tag-version
          pnpm publish --no-git-checks --access public --tag authcheck --ignore-scripts
          echo "Publish rights CONFIRMED (published $CANARY)"
          npm unpublish "@sriinnu/harmon@$CANARY" --force
          npm dist-tag rm @sriinnu/harmon authcheck || true
          echo "Canary cleaned up — registry back to pristine"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: npm auth check

# On-demand: verifies NPM_TOKEN can authenticate and has publish access to
# @sriinnu/harmon — npm masks permission failures as 404 at publish time,
# so this answers "will the next release publish?" without publishing.
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: whoami
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: publish access on @sriinnu/harmon (hard assertion)
        run: |
          npm access list packages
          # Granular tokens list their grants: read-write = can publish.
          # This grep FAILS the run when the token lacks publish rights.
          npm access list packages 2>/dev/null | grep -qE '@sriinnu/harmon:\s*read-write'
          echo "Token has read-write on @sriinnu/harmon — releases will publish."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm exec vitest run

      - name: Build
        run: pnpm build

      - name: Smoke published entrypoints
        run: |
          node --input-type=module -e "const cli = await import('./apps/harmon-cli/dist/index.js'); if (typeof cli.createCLI !== 'function') throw new Error('Missing CLI export');"
          node --input-type=module -e "const daemon = await import('./apps/harmond/dist/src/index.js'); if (typeof daemon.createDaemon !== 'function') throw new Error('Missing daemon export');"

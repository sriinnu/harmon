<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="100" cy="100" r="95" fill="url(#glowGradient)"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="85" stroke="url(#primaryGradient)" stroke-width="3" fill="none" opacity="0.8"/>

  <!-- Frequency waves (top) -->
  <path d="M 30 80 Q 50 60, 70 80 T 110 80" stroke="url(#secondaryGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 90 80 Q 110 60, 130 80 T 170 80" stroke="url(#secondaryGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Frequency waves (bottom) -->
  <path d="M 30 120 Q 50 140, 70 120 T 110 120" stroke="url(#secondaryGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 90 120 Q 110 140, 130 120 T 170 120" stroke="url(#secondaryGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Center harmony symbol -->
  <circle cx="100" cy="100" r="20" fill="url(#primaryGradient)"/>
  <circle cx="100" cy="100" r="30" stroke="url(#primaryGradient)" stroke-width="2" fill="none" opacity="0.5"/>
  <circle cx="100" cy="100" r="40" stroke="url(#primaryGradient)" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Musical note hint -->
  <circle cx="100" cy="100" r="8" fill="#ffffff" opacity="0.9"/>
  <rect x="107" y="85" width="2" height="15" fill="#ffffff" opacity="0.9" rx="1"/>

  <!-- Sound emanation lines -->
  <line x1="20" y1="100" x2="35" y2="100" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="25" y1="85" x2="38" y2="90" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="25" y1="115" x2="38" y2="110" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <line x1="180" y1="100" x2="165" y2="100" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="175" y1="85" x2="162" y2="90" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="175" y1="115" x2="162" y2="110" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>

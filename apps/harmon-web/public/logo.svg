<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Harmon mark: two listeners joined by one shared beamed note — the beam is
    the bridge. Same paper-and-ink identity as before, simplified to strong
    silhouettes with a single warm accent so it survives favicon sizes.
  -->
  <defs>
    <radialGradient id="harmon-paper" cx="50%" cy="36%" r="80%">
      <stop offset="0%" stop-color="#F8EFE0"/>
      <stop offset="100%" stop-color="#EEDFC5"/>
    </radialGradient>
  </defs>

  <rect width="200" height="200" rx="40" fill="url(#harmon-paper)"/>

  <!-- Shared beamed note: the bridge between the two listeners -->
  <g fill="#C8502A">
    <path d="M89 50L131 42V31L89 39Z"/>
    <rect x="89" y="45" width="5" height="56" rx="2.5"/>
    <rect x="126" y="37" width="5" height="56" rx="2.5"/>
    <ellipse cx="84" cy="101" rx="9.5" ry="7" transform="rotate(-18 84 101)"/>
    <ellipse cx="121" cy="93" rx="9.5" ry="7" transform="rotate(-18 121 93)"/>
  </g>

  <!-- Listeners: ink silhouettes, heads tilted toward the shared note -->
  <g fill="#1A1714">
    <circle cx="55" cy="127" r="12.5"/>
    <path d="M35 172C35 151 45 142 55 142C65 142 75 151 75 172Z"/>
    <circle cx="145" cy="127" r="12.5"/>
    <path d="M125 172C125 151 135 142 145 142C155 142 165 151 165 172Z"/>
  </g>

  <!-- Sound arcs: one pair per side, quiet -->
  <g stroke="#1A1714" stroke-width="3.4" stroke-linecap="round">
    <path d="M27 106C33 97 43 93 52 96" opacity="0.5"/>
    <path d="M34 116C38 111 44 109 49 110" opacity="0.32"/>
    <path d="M173 106C167 97 157 93 148 96" opacity="0.5"/>
    <path d="M166 116C162 111 156 109 151 110" opacity="0.32"/>
  </g>

  <!-- Shared ground -->
  <path d="M42 178C72 170 128 170 158 178" stroke="#1A1714" stroke-width="3.4" stroke-linecap="round" opacity="0.3"/>
</svg>
